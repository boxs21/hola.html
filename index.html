<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FormaNGO — Plataforma de Capacitación</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --forest: #1a5c4a;
                --forest-mid: #2d7a62;
                --forest-light: #4aa87f;
                --sage: #a8c5b5;
                --sage-pale: #e4ede9;
                --teal: #0f7ea3;
                --teal-light: #e0f2f9;
                --ink: #121d1a;
                --ink-mid: #2e3f3a;
                --ink-soft: #5a6e68;
                --muted: #8fa49e;
                --border: #d4e2dc;
                --surface: #f5f9f7;
                --white: #ffffff;
                --gold: #c8943a;
                --gold-light: #fdf3e3;
                --red: #c0392b;
                --red-light: #fdecea;
                --radius: 12px;
                --radius-sm: 7px;
                --shadow: 0 2px 12px rgba(26, 92, 74, 0.09);
                --shadow-md: 0 6px 28px rgba(26, 92, 74, 0.13);
                --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "DM Sans", sans-serif;
                background: var(--surface);
                color: var(--ink);
                font-size: 14px;
                line-height: 1.6;
                min-height: 100vh;
            }

            h1,
            h2,
            h3,
            h4 {
                font-family: "Fraunces", serif;
                font-weight: 600;
                letter-spacing: -0.01em;
            }

            /* ─── VIEWS ─────────────────────────────────────────── */
            .view {
                display: none;
            }
            .view.active {
                display: flex;
            }

            /* ══════════════════════════════════════════════════════
   LOGIN
══════════════════════════════════════════════════════ */
            #login {
                min-height: 100vh;
                align-items: center;
                justify-content: center;
                background: linear-gradient(
                    140deg,
                    #0d3a2e 0%,
                    #1a5c4a 50%,
                    #0f7ea3 100%
                );
                position: relative;
                overflow: hidden;
            }
            #login::before {
                content: "";
                position: absolute;
                width: 700px;
                height: 700px;
                border-radius: 50%;
                background: radial-gradient(
                    circle,
                    rgba(74, 168, 127, 0.18) 0%,
                    transparent 70%
                );
                top: -200px;
                right: -200px;
                pointer-events: none;
            }
            #login::after {
                content: "";
                position: absolute;
                width: 400px;
                height: 400px;
                border-radius: 50%;
                background: radial-gradient(
                    circle,
                    rgba(15, 126, 163, 0.15) 0%,
                    transparent 70%
                );
                bottom: -100px;
                left: -100px;
                pointer-events: none;
            }

            .login-card {
                background: var(--white);
                border-radius: 20px;
                padding: 52px 48px;
                width: 420px;
                box-shadow: 0 32px 80px rgba(0, 0, 0, 0.25);
                position: relative;
                z-index: 1;
                animation: slideUp 0.5s ease;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(24px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .login-logo {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 36px;
            }
            .login-logo-icon {
                width: 48px;
                height: 48px;
                background: linear-gradient(
                    135deg,
                    var(--forest),
                    var(--forest-light)
                );
                border-radius: 14px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 22px;
            }
            .login-logo-text {
                display: flex;
                flex-direction: column;
            }
            .login-logo-text strong {
                font-family: "Fraunces", serif;
                font-size: 22px;
                color: var(--ink);
                line-height: 1;
            }
            .login-logo-text span {
                font-size: 11px;
                color: var(--muted);
                letter-spacing: 0.04em;
                text-transform: uppercase;
            }

            .login-card h2 {
                font-size: 26px;
                color: var(--ink);
                margin-bottom: 6px;
            }
            .login-card p {
                color: var(--ink-soft);
                font-size: 13px;
                margin-bottom: 28px;
            }

            .form-group {
                margin-bottom: 18px;
            }
            .form-group label {
                display: block;
                font-size: 12px;
                font-weight: 600;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                color: var(--ink-soft);
                margin-bottom: 7px;
            }
            .form-group input {
                width: 100%;
                padding: 12px 16px;
                border: 1.5px solid var(--border);
                border-radius: var(--radius-sm);
                font-family: "DM Sans", sans-serif;
                font-size: 14px;
                color: var(--ink);
                background: var(--surface);
                transition: var(--transition);
                outline: none;
            }
            .form-group input:focus {
                border-color: var(--forest-mid);
                background: var(--white);
                box-shadow: 0 0 0 3px rgba(45, 122, 98, 0.12);
            }

            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 12px 22px;
                border-radius: var(--radius-sm);
                font-family: "DM Sans", sans-serif;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                border: none;
                transition: var(--transition);
                text-decoration: none;
                white-space: nowrap;
            }
            .btn-primary {
                background: var(--forest);
                color: var(--white);
            }
            .btn-primary:hover {
                background: var(--forest-mid);
                transform: translateY(-1px);
                box-shadow: var(--shadow-md);
            }
            .btn-secondary {
                background: var(--sage-pale);
                color: var(--forest);
                border: 1.5px solid var(--border);
            }
            .btn-secondary:hover {
                background: var(--border);
            }
            .btn-ghost {
                background: transparent;
                color: var(--ink-soft);
            }
            .btn-ghost:hover {
                background: var(--sage-pale);
                color: var(--ink);
            }
            .btn-danger {
                background: var(--red-light);
                color: var(--red);
                border: 1.5px solid rgba(192, 57, 43, 0.15);
            }
            .btn-danger:hover {
                background: #fbd9d6;
            }
            .btn-teal {
                background: var(--teal);
                color: var(--white);
            }
            .btn-teal:hover {
                background: #0a6a8a;
            }
            .btn-full {
                width: 100%;
            }
            .btn-sm {
                padding: 7px 14px;
                font-size: 12px;
            }
            .btn-icon {
                padding: 8px;
                border-radius: 8px;
            }

            .login-footer {
                text-align: center;
                margin-top: 20px;
            }
            .login-footer a {
                color: var(--forest-mid);
                font-size: 13px;
                text-decoration: none;
                font-weight: 500;
            }
            .login-footer a:hover {
                text-decoration: underline;
            }
            .login-demo {
                margin-top: 20px;
                padding-top: 20px;
                border-top: 1px solid var(--border);
            }
            .login-demo p {
                font-size: 11px;
                color: var(--muted);
                margin-bottom: 10px;
                text-align: center;
                text-transform: uppercase;
                letter-spacing: 0.04em;
            }
            .demo-btns {
                display: flex;
                gap: 8px;
            }
            .demo-btns button {
                flex: 1;
            }

            /* ══════════════════════════════════════════════════════
   APP LAYOUT
══════════════════════════════════════════════════════ */
            #app {
                min-height: 100vh;
                flex-direction: row;
            }

            /* SIDEBAR */
            .sidebar {
                width: 240px;
                min-height: 100vh;
                background: var(--ink);
                display: flex;
                flex-direction: column;
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 100;
                transition: var(--transition);
            }
            .sidebar-brand {
                padding: 24px 20px 20px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .sidebar-brand-icon {
                width: 38px;
                height: 38px;
                background: linear-gradient(
                    135deg,
                    var(--forest-light),
                    var(--teal)
                );
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                flex-shrink: 0;
            }
            .sidebar-brand-text {
                display: flex;
                flex-direction: column;
            }
            .sidebar-brand-text strong {
                font-family: "Fraunces", serif;
                font-size: 16px;
                color: var(--white);
                line-height: 1.1;
            }
            .sidebar-brand-text span {
                font-size: 10px;
                color: rgba(255, 255, 255, 0.4);
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }

            .sidebar-user {
                padding: 16px 20px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .user-avatar {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
                font-weight: 600;
                color: var(--white);
                flex-shrink: 0;
            }
            .avatar-admin {
                background: linear-gradient(
                    135deg,
                    var(--forest-light),
                    var(--teal)
                );
            }
            .avatar-user {
                background: linear-gradient(135deg, var(--gold), #e2aa56);
            }
            .user-info {
                flex: 1;
                min-width: 0;
            }
            .user-info strong {
                display: block;
                font-size: 13px;
                color: var(--white);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .user-info span {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.4);
            }
            .user-badge {
                font-size: 10px;
                padding: 2px 7px;
                border-radius: 20px;
                font-weight: 600;
            }
            .badge-admin {
                background: rgba(74, 168, 127, 0.2);
                color: var(--forest-light);
            }
            .badge-user {
                background: rgba(200, 148, 58, 0.2);
                color: #e2aa56;
            }

            .sidebar-nav {
                flex: 1;
                padding: 12px 0;
                overflow-y: auto;
            }
            .nav-section {
                padding: 0 12px;
                margin-bottom: 4px;
            }
            .nav-label {
                font-size: 10px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.25);
                padding: 8px 10px 4px;
            }
            .nav-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 9px 10px;
                border-radius: 8px;
                color: rgba(255, 255, 255, 0.55);
                cursor: pointer;
                transition: var(--transition);
                font-size: 13.5px;
                font-weight: 400;
                margin-bottom: 1px;
            }
            .nav-item:hover {
                background: rgba(255, 255, 255, 0.06);
                color: rgba(255, 255, 255, 0.85);
            }
            .nav-item.active {
                background: rgba(74, 168, 127, 0.15);
                color: var(--forest-light);
                font-weight: 500;
            }
            .nav-item.active .nav-icon {
                color: var(--forest-light);
            }
            .nav-icon {
                font-size: 16px;
                width: 20px;
                text-align: center;
                flex-shrink: 0;
            }
            .nav-badge {
                margin-left: auto;
                background: var(--forest-light);
                color: var(--ink);
                font-size: 10px;
                font-weight: 700;
                padding: 1px 6px;
                border-radius: 20px;
            }

            .sidebar-bottom {
                padding: 12px;
                border-top: 1px solid rgba(255, 255, 255, 0.07);
            }

            /* MAIN */
            .main {
                margin-left: 240px;
                flex: 1;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            .topbar {
                background: var(--white);
                border-bottom: 1px solid var(--border);
                padding: 0 28px;
                height: 60px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                position: sticky;
                top: 0;
                z-index: 50;
            }
            .topbar-left h3 {
                font-size: 17px;
                font-family: "Fraunces", serif;
                color: var(--ink);
            }
            .topbar-left p {
                font-size: 12px;
                color: var(--muted);
            }
            .topbar-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .topbar-icon {
                width: 36px;
                height: 36px;
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--surface);
                cursor: pointer;
                color: var(--ink-soft);
                transition: var(--transition);
                font-size: 16px;
                border: 1.5px solid var(--border);
            }
            .topbar-icon:hover {
                background: var(--sage-pale);
                color: var(--ink);
            }
            .notif-dot {
                position: relative;
            }
            .notif-dot::after {
                content: "";
                position: absolute;
                top: 6px;
                right: 6px;
                width: 7px;
                height: 7px;
                background: var(--forest-light);
                border-radius: 50%;
                border: 2px solid var(--white);
            }

            .page-content {
                padding: 28px;
                flex: 1;
            }

            /* ─── PAGE SECTIONS ───────────────────────────────── */
            .page {
                display: none;
            }
            .page.active {
                display: block;
                animation: fadeIn 0.25s ease;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(6px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* CARDS */
            .card {
                background: var(--white);
                border-radius: var(--radius);
                border: 1.5px solid var(--border);
                box-shadow: var(--shadow);
            }
            .card-header {
                padding: 18px 22px 14px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .card-header h3 {
                font-size: 15px;
                font-family: "Fraunces", serif;
            }
            .card-body {
                padding: 22px;
            }

            /* STATS ROW */
            .stats-row {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                margin-bottom: 24px;
            }
            .stat-card {
                background: var(--white);
                border: 1.5px solid var(--border);
                border-radius: var(--radius);
                padding: 20px 22px;
                box-shadow: var(--shadow);
                display: flex;
                flex-direction: column;
                gap: 10px;
                transition: var(--transition);
            }
            .stat-card:hover {
                transform: translateY(-2px);
                box-shadow: var(--shadow-md);
            }
            .stat-top {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
            }
            .stat-icon {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
            }
            .stat-trend {
                font-size: 11px;
                font-weight: 600;
                display: flex;
                align-items: center;
                gap: 3px;
            }
            .trend-up {
                color: #2e8b57;
            }
            .trend-down {
                color: var(--red);
            }
            .stat-value {
                font-family: "Fraunces", serif;
                font-size: 32px;
                font-weight: 700;
                color: var(--ink);
                line-height: 1;
            }
            .stat-label {
                font-size: 12px;
                color: var(--muted);
            }

            .si-green {
                background: rgba(74, 168, 127, 0.12);
                color: var(--forest-light);
            }
            .si-teal {
                background: rgba(15, 126, 163, 0.12);
                color: var(--teal);
            }
            .si-gold {
                background: rgba(200, 148, 58, 0.12);
                color: var(--gold);
            }
            .si-sage {
                background: rgba(168, 197, 181, 0.25);
                color: var(--forest-mid);
            }

            /* PROGRESS BAR */
            .progress {
                height: 6px;
                background: var(--sage-pale);
                border-radius: 10px;
                overflow: hidden;
            }
            .progress-bar {
                height: 100%;
                border-radius: 10px;
                transition: width 0.6s ease;
            }
            .progress-green {
                background: linear-gradient(
                    90deg,
                    var(--forest-mid),
                    var(--forest-light)
                );
            }
            .progress-teal {
                background: linear-gradient(90deg, var(--teal), #55b5d4);
            }
            .progress-gold {
                background: linear-gradient(90deg, var(--gold), #e2aa56);
            }

            /* GRID */
            .grid-2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
            .grid-3 {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
            }

            /* ACTIVITY LIST */
            .activity-item {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                padding: 12px 0;
                border-bottom: 1px solid var(--sage-pale);
            }
            .activity-item:last-child {
                border-bottom: none;
                padding-bottom: 0;
            }
            .activity-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                margin-top: 5px;
                flex-shrink: 0;
            }
            .dot-green {
                background: var(--forest-light);
            }
            .dot-teal {
                background: var(--teal);
            }
            .dot-gold {
                background: var(--gold);
            }
            .activity-info {
                flex: 1;
            }
            .activity-info strong {
                font-size: 13px;
                font-weight: 500;
                color: var(--ink);
            }
            .activity-info p {
                font-size: 12px;
                color: var(--muted);
            }
            .activity-time {
                font-size: 11px;
                color: var(--muted);
                white-space: nowrap;
            }

            /* CHART PLACEHOLDER */
            .chart-bars {
                display: flex;
                align-items: flex-end;
                gap: 6px;
                height: 100px;
                padding: 8px 0;
            }
            .chart-bar {
                flex: 1;
                border-radius: 5px 5px 2px 2px;
                transition: var(--transition);
                cursor: pointer;
            }
            .chart-bar:hover {
                filter: brightness(1.1);
                transform: scaleY(1.05);
                transform-origin: bottom;
            }
            .chart-label {
                display: flex;
                gap: 6px;
                margin-top: 6px;
            }
            .chart-label span {
                flex: 1;
                text-align: center;
                font-size: 10px;
                color: var(--muted);
            }

            /* TABS */
            .tabs {
                display: flex;
                gap: 2px;
                background: var(--sage-pale);
                padding: 3px;
                border-radius: 9px;
                margin-bottom: 20px;
                width: fit-content;
            }
            .tab {
                padding: 7px 16px;
                border-radius: 7px;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                color: var(--muted);
                transition: var(--transition);
                border: none;
                background: none;
                font-family: "DM Sans", sans-serif;
            }
            .tab.active {
                background: var(--white);
                color: var(--ink);
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            }
            .tab:hover:not(.active) {
                color: var(--ink-soft);
            }

            /* COURSE CARDS */
            .course-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
            }
            .course-card {
                background: var(--white);
                border: 1.5px solid var(--border);
                border-radius: var(--radius);
                overflow: hidden;
                transition: var(--transition);
                cursor: pointer;
            }
            .course-card:hover {
                transform: translateY(-3px);
                box-shadow: var(--shadow-md);
                border-color: var(--sage);
            }
            .course-thumb {
                height: 120px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 40px;
                position: relative;
            }
            .course-thumb-overlay {
                position: absolute;
                inset: 0;
                opacity: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(26, 92, 74, 0.75);
                transition: var(--transition);
                font-size: 14px;
                color: white;
                font-weight: 500;
                gap: 6px;
            }
            .course-card:hover .course-thumb-overlay {
                opacity: 1;
            }
            .course-body {
                padding: 16px;
            }
            .course-body h4 {
                font-size: 14px;
                font-family: "Fraunces", serif;
                color: var(--ink);
                margin-bottom: 6px;
                line-height: 1.3;
            }
            .course-meta {
                display: flex;
                align-items: center;
                gap: 8px;
                flex-wrap: wrap;
                margin-top: 10px;
            }
            .badge {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                padding: 3px 9px;
                border-radius: 20px;
                font-size: 11px;
                font-weight: 500;
            }
            .badge-green {
                background: rgba(74, 168, 127, 0.12);
                color: var(--forest-mid);
            }
            .badge-teal {
                background: var(--teal-light);
                color: var(--teal);
            }
            .badge-gold {
                background: var(--gold-light);
                color: var(--gold);
            }
            .badge-gray {
                background: var(--sage-pale);
                color: var(--muted);
            }
            .badge-red {
                background: var(--red-light);
                color: var(--red);
            }
            .course-progress {
                margin-top: 10px;
            }
            .course-progress-info {
                display: flex;
                justify-content: space-between;
                margin-bottom: 5px;
                font-size: 11px;
                color: var(--muted);
            }

            /* TABLE */
            .data-table {
                width: 100%;
                border-collapse: collapse;
            }
            .data-table th {
                padding: 10px 14px;
                text-align: left;
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                color: var(--muted);
                border-bottom: 1.5px solid var(--border);
                background: var(--surface);
            }
            .data-table td {
                padding: 13px 14px;
                border-bottom: 1px solid var(--sage-pale);
                font-size: 13px;
                vertical-align: middle;
            }
            .data-table tr:last-child td {
                border-bottom: none;
            }
            .data-table tr:hover td {
                background: var(--surface);
            }
            .user-cell {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .user-cell-avatar {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 11px;
                font-weight: 600;
                color: var(--white);
                flex-shrink: 0;
            }

            /* FILTERS */
            .filters {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 18px;
                flex-wrap: wrap;
            }
            .filter-input {
                padding: 9px 14px;
                border: 1.5px solid var(--border);
                border-radius: var(--radius-sm);
                font-family: "DM Sans", sans-serif;
                font-size: 13px;
                color: var(--ink);
                background: var(--white);
                outline: none;
                transition: var(--transition);
            }
            .filter-input:focus {
                border-color: var(--forest-mid);
                box-shadow: 0 0 0 3px rgba(45, 122, 98, 0.1);
            }
            select.filter-input {
                cursor: pointer;
            }

            /* FORM */
            .form-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
            .form-group textarea {
                width: 100%;
                padding: 12px 16px;
                border: 1.5px solid var(--border);
                border-radius: var(--radius-sm);
                font-family: "DM Sans", sans-serif;
                font-size: 14px;
                color: var(--ink);
                background: var(--surface);
                transition: var(--transition);
                outline: none;
                resize: vertical;
                min-height: 90px;
            }
            .form-group textarea:focus {
                border-color: var(--forest-mid);
                background: var(--white);
            }
            .form-group select {
                width: 100%;
                padding: 12px 16px;
                border: 1.5px solid var(--border);
                border-radius: var(--radius-sm);
                font-family: "DM Sans", sans-serif;
                font-size: 14px;
                color: var(--ink);
                background: var(--surface);
                outline: none;
                cursor: pointer;
            }
            .upload-zone {
                border: 2px dashed var(--border);
                border-radius: var(--radius);
                padding: 32px;
                text-align: center;
                cursor: pointer;
                transition: var(--transition);
            }
            .upload-zone:hover {
                border-color: var(--forest-mid);
                background: rgba(45, 122, 98, 0.03);
            }
            .upload-zone .icon {
                font-size: 32px;
                margin-bottom: 10px;
            }
            .upload-zone p {
                font-size: 13px;
                color: var(--muted);
            }
            .upload-zone strong {
                color: var(--forest-mid);
            }

            /* MODAL */
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(18, 29, 26, 0.55);
                z-index: 200;
                align-items: center;
                justify-content: center;
                backdrop-filter: blur(3px);
            }
            .modal-overlay.open {
                display: flex;
            }
            .modal {
                background: var(--white);
                border-radius: 16px;
                width: 560px;
                max-width: 90vw;
                max-height: 85vh;
                overflow-y: auto;
                box-shadow: 0 32px 80px rgba(0, 0, 0, 0.2);
                animation: slideUp 0.3s ease;
            }
            .modal-header {
                padding: 22px 26px 18px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                position: sticky;
                top: 0;
                background: var(--white);
                z-index: 1;
            }
            .modal-header h3 {
                font-size: 18px;
            }
            .modal-close {
                cursor: pointer;
                color: var(--muted);
                font-size: 20px;
                line-height: 1;
                transition: var(--transition);
            }
            .modal-close:hover {
                color: var(--ink);
            }
            .modal-body {
                padding: 24px 26px;
            }
            .modal-footer {
                padding: 16px 26px 22px;
                display: flex;
                justify-content: flex-end;
                gap: 10px;
            }

            /* EVAL QUESTION */
            .question-block {
                background: var(--surface);
                border: 1.5px solid var(--border);
                border-radius: var(--radius);
                padding: 18px;
                margin-bottom: 14px;
            }
            .question-block h4 {
                font-size: 14px;
                margin-bottom: 14px;
                font-family: "DM Sans", sans-serif;
                font-weight: 500;
            }
            .option-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 12px;
                border-radius: 8px;
                margin-bottom: 6px;
                cursor: pointer;
                transition: var(--transition);
                border: 1.5px solid var(--border);
                background: var(--white);
                font-size: 13.5px;
            }
            .option-item:hover {
                border-color: var(--sage);
                background: var(--sage-pale);
            }
            .option-item.selected {
                border-color: var(--forest-mid);
                background: rgba(45, 122, 98, 0.06);
                color: var(--forest);
            }
            .option-radio {
                width: 18px;
                height: 18px;
                border-radius: 50%;
                border: 2px solid var(--border);
                flex-shrink: 0;
                transition: var(--transition);
            }
            .option-item.selected .option-radio {
                border-color: var(--forest-mid);
                background: var(--forest-mid);
            }
            .option-item.correct {
                border-color: var(--forest-light);
                background: rgba(74, 168, 127, 0.08);
            }
            .option-item.incorrect {
                border-color: var(--red);
                background: var(--red-light);
            }

            /* CERTIFICATE */
            .cert-preview {
                background: linear-gradient(135deg, #0d3a2e 0%, #1a5c4a 100%);
                border-radius: var(--radius);
                padding: 40px;
                text-align: center;
                color: white;
                position: relative;
                overflow: hidden;
            }
            .cert-preview::before {
                content: "";
                position: absolute;
                inset: 0;
                background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            }
            .cert-seal {
                font-size: 56px;
                margin-bottom: 16px;
            }
            .cert-title {
                font-family: "Fraunces", serif;
                font-size: 11px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                opacity: 0.6;
                margin-bottom: 6px;
            }
            .cert-name {
                font-family: "Fraunces", serif;
                font-size: 28px;
                font-weight: 700;
                margin-bottom: 8px;
            }
            .cert-course {
                font-size: 13px;
                opacity: 0.75;
                margin-bottom: 20px;
            }
            .cert-meta {
                display: flex;
                justify-content: center;
                gap: 32px;
                font-size: 12px;
                opacity: 0.6;
            }

            /* DONUT CHART */
            .donut-wrap {
                display: flex;
                align-items: center;
                gap: 24px;
            }
            .donut {
                position: relative;
            }
            .donut-label {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            .donut-label strong {
                font-family: "Fraunces", serif;
                font-size: 22px;
                color: var(--ink);
                line-height: 1;
            }
            .donut-label span {
                font-size: 11px;
                color: var(--muted);
            }
            .donut-legend {
                flex: 1;
            }
            .legend-item {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 8px;
                font-size: 12px;
            }
            .legend-dot {
                width: 10px;
                height: 10px;
                border-radius: 3px;
                flex-shrink: 0;
            }

            /* PAGE HEADER */
            .page-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 22px;
            }
            .page-header h2 {
                font-size: 22px;
            }
            .page-header p {
                font-size: 13px;
                color: var(--muted);
                margin-top: 2px;
            }

            /* RESULT SCREEN */
            .result-banner {
                text-align: center;
                padding: 36px;
                border-radius: var(--radius);
                margin-bottom: 20px;
            }
            .result-pass {
                background: linear-gradient(
                    135deg,
                    rgba(74, 168, 127, 0.12),
                    rgba(45, 122, 98, 0.06)
                );
                border: 1.5px solid rgba(74, 168, 127, 0.25);
            }
            .result-fail {
                background: var(--red-light);
                border: 1.5px solid rgba(192, 57, 43, 0.15);
            }
            .result-icon {
                font-size: 52px;
                margin-bottom: 14px;
            }
            .result-score {
                font-family: "Fraunces", serif;
                font-size: 52px;
                font-weight: 700;
                line-height: 1;
            }
            .result-score.pass {
                color: var(--forest);
            }
            .result-score.fail {
                color: var(--red);
            }

            /* NOTIFICATION */
            .notification {
                position: fixed;
                top: 80px;
                right: 24px;
                background: var(--white);
                border: 1.5px solid var(--border);
                border-radius: var(--radius);
                padding: 14px 18px;
                box-shadow: var(--shadow-md);
                display: flex;
                align-items: flex-start;
                gap: 12px;
                width: 300px;
                z-index: 500;
                animation: slideRight 0.3s ease;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s;
            }
            .notification.show {
                opacity: 1;
                pointer-events: auto;
            }
            @keyframes slideRight {
                from {
                    transform: translateX(20px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            .notif-icon {
                font-size: 20px;
            }
            .notif-content strong {
                font-size: 13px;
                display: block;
            }
            .notif-content p {
                font-size: 12px;
                color: var(--muted);
            }

            /* RESPONSIVE */
            @media (max-width: 1100px) {
                .stats-row {
                    grid-template-columns: repeat(2, 1fr);
                }
                .course-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }
            @media (max-width: 800px) {
                .sidebar {
                    transform: translateX(-100%);
                }
                .sidebar.open {
                    transform: translateX(0);
                }
                .main {
                    margin-left: 0;
                }
                .grid-2 {
                    grid-template-columns: 1fr;
                }
                .course-grid {
                    grid-template-columns: 1fr;
                }
                .stats-row {
                    grid-template-columns: 1fr 1fr;
                }
                .form-row {
                    grid-template-columns: 1fr;
                }
            }

            /* Scrollbar */
            ::-webkit-scrollbar {
                width: 5px;
                height: 5px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 10px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: var(--muted);
            }

            /* Role toggle in login */
            .role-selector {
                display: flex;
                gap: 8px;
                margin-bottom: 20px;
            }
            .role-btn {
                flex: 1;
                padding: 10px;
                border-radius: 8px;
                border: 1.5px solid var(--border);
                background: var(--surface);
                cursor: pointer;
                font-family: "DM Sans", sans-serif;
                font-size: 13px;
                font-weight: 500;
                transition: var(--transition);
                text-align: center;
                color: var(--ink-soft);
            }
            .role-btn.active {
                border-color: var(--forest-mid);
                background: rgba(45, 122, 98, 0.07);
                color: var(--forest);
            }

            /* Misc */
            .sep {
                height: 1px;
                background: var(--border);
                margin: 20px 0;
            }
            .text-muted {
                color: var(--muted);
                font-size: 12px;
            }
            .flex-between {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .flex-gap {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .mt-4 {
                margin-top: 4px;
            }
            .mt-8 {
                margin-top: 8px;
            }
            .mt-16 {
                margin-top: 16px;
            }
            .mb-16 {
                margin-bottom: 16px;
            }
            .mb-20 {
                margin-bottom: 20px;
            }
            .w-full {
                width: 100%;
            }

            /* Inline video viewer */
            .video-player {
                background: #000;
                border-radius: var(--radius);
                aspect-ratio: 16/9;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 50px;
                cursor: pointer;
                position: relative;
                overflow: hidden;
            }
            .video-player::before {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    135deg,
                    rgba(26, 92, 74, 0.6),
                    rgba(15, 126, 163, 0.4)
                );
            }
            .play-btn {
                position: relative;
                z-index: 1;
                width: 60px;
                height: 60px;
                background: rgba(255, 255, 255, 0.9);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 22px;
                transition: var(--transition);
            }
            .video-player:hover .play-btn {
                transform: scale(1.1);
                background: var(--white);
            }

            /* Status pills */
            .status {
                display: inline-flex;
                align-items: center;
                gap: 5px;
            }
            .status::before {
                content: "";
                width: 6px;
                height: 6px;
                border-radius: 50%;
                flex-shrink: 0;
            }
            .status-active {
                color: var(--forest-mid);
            }
            .status-active::before {
                background: var(--forest-light);
            }
            .status-inactive {
                color: var(--muted);
            }
            .status-inactive::before {
                background: var(--muted);
            }
            .status-pending {
                color: var(--gold);
            }
            .status-pending::before {
                background: var(--gold);
            }
        </style>
    </head>

                document.getElementById("login-email").value =

                currentRole = role;
                document.querySelectorAll(".role-btn").forEach((b, i) => {
                    b.classList.toggle(
                        "active",
                        (i === 0 && role === "admin") ||
                            (i === 1 && role === "user"),
                    );
                });
                doLogin();
            }

            function doLogin() {
                document.getElementById("login").classList.remove("active");
                document.getElementById("app").classList.add("active");
                setupApp();
            }

            function doLogout() {
                document.getElementById("app").classList.remove("active");
                document.getElementById("login").classList.add("active");
            }

            // ─── APP SETUP ──────────────────────────────────────
            function setupApp() {
                const isAdmin = currentRole === "admin";
                // Sidebar user
                document.getElementById("sidebar-avatar").className =
                    `user-avatar ${isAdmin ? "avatar-admin" : "avatar-user"}`;
                document.getElementById("sidebar-avatar").textContent = isAdmin
                    ? "AB"
                    : "MC";
                document.getElementById("sidebar-name").textContent = isAdmin
                    ? "Ana Beltrán"
                    : "Miguel Castillo";
                document.getElementById("sidebar-role-text").innerHTML =
                    `<span class="user-badge ${isAdmin ? "badge-admin" : "badge-user"}">${isAdmin ? "Admin" : "Colaborador"}</span>`;

                // Nav
                buildNav(isAdmin ? ADMIN_NAV : USER_NAV);
                // Pages container
                buildPages(isAdmin);
                // Navigate
                navigateTo("dashboard");
            }

            function buildNav(navConfig) {
                const nav = document.getElementById("sidebar-nav");
                nav.innerHTML = "";
                navConfig.forEach((section) => {
                    const sec = document.createElement("div");
                    sec.className = "nav-section";
                    sec.innerHTML = `<div class="nav-label">${section.section}</div>`;
                    section.items.forEach((item) => {
                        const el = document.createElement("div");
                        el.className = "nav-item";
                        el.id = `nav-${item.id}`;
                        el.innerHTML = `<span class="nav-icon">${item.icon}</span>${item.label}${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ""}`;
                        el.onclick = () => navigateTo(item.id);
                        sec.appendChild(el);
                    });
                    nav.appendChild(sec);
                });
            }

            function navigateTo(pageId) {
                currentPage = pageId;
                document
                    .querySelectorAll(".nav-item")
                    .forEach((n) => n.classList.remove("active"));
                const nav = document.getElementById(`nav-${pageId}`);
                if (nav) nav.classList.add("active");

                document
                    .querySelectorAll(".page")
                    .forEach((p) => p.classList.remove("active"));
                const page = document.getElementById(`page-${pageId}`);
                if (page) page.classList.add("active");

                const t = TOPBAR[pageId] || {
                    title: pageId,
                    sub: "",
                    btn: null,
                };
                document.getElementById("topbar-title").textContent = t.title;
                document.getElementById("topbar-sub").textContent = t.sub;
                const btn = document.getElementById("topbar-action-btn");

      <div style="font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;">PREGUNTA 1 · Opción múltiple</div>
      <input class="filter-input w-full" type="text" value="¿Cuál es la política de contraseñas seguras?" style="margin-bottom:10px;">
      ${["Mínimo 8 caracteres", "Usar la misma en todos", "Solo letras"]
          .map(
              (o, i) => `
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
        <input type="radio" name="correct2" ${i === 0 ? "checked" : ""}> <input class="filter-input" style="flex:1;" type="text" value="${o}">
      </div>`,
          )
          .join("")}
    </div>`;
                openModal();
            }

            // ─── EVAL FLOW ───────────────────────────────────
            const EVAL_QUESTIONS = [
                {
                    q: "¿Qué significa comunicación no violenta?",
                    options: [
                        "Expresar necesidades sin culpa",
                        "Hablar en voz baja",
                        "No hablar hasta que te hablen",
                        "Evitar el contacto visual",
                    ],
                    answer: 0,
                },
                {
                    q: "¿Cuál es el primer paso del modelo CNV?",
                    options: [
                        "Evaluar al otro",
                        "Observar sin juzgar",
                        "Dar consejos",
                        "Expresar exigencias",
                    ],
                    answer: 1,
                },
                {
                    q: "Las emociones en CNV se enfocan en:",
                    options: [
                        "Las acciones del otro",
                        "Las propias necesidades",
                        "El pasado",
                        "La culpa",
                    ],
                    answer: 1,
                },
                {
                    q: "Verdadero o Falso: CNV solo se aplica en conflictos",
                    options: ["Verdadero", "Falso"],
                    answer: 1,
                },
            ];
            let currentQ = 0;

            function startEval() {
                currentQ = 0;
                evalAnswers = {};
                document.getElementById("eval-list-view").style.display =
                    "none";
                document.getElementById("eval-view").style.display = "block";
                document.getElementById("eval-result-view").style.display =
                    "none";
                renderQuestion();
            }

            function renderQuestion() {
                const q = EVAL_QUESTIONS[currentQ];
                document.getElementById("q-num").textContent = currentQ + 1;
                document.getElementById("eval-progress").style.width =
                    `${((currentQ + 1) / EVAL_QUESTIONS.length) * 100}%`;
                document.getElementById("eval-next-btn").textContent =
                    currentQ === EVAL_QUESTIONS.length - 1
                        ? "Terminar ✓"
                        : "Siguiente →";
                document.getElementById("eval-question-area").innerHTML = `
    <div class="question-block" style="background:transparent;border:none;padding:0;">
      <h4 style="font-size:16px;margin-bottom:16px;">${currentQ + 1}. ${q.q}</h4>
      ${q.options
          .map(
              (o, i) => `
      <div class="option-item ${evalAnswers[currentQ] === i ? "selected" : ""}" onclick="selectAnswer(${i})">
        <div class="option-radio"></div> ${o}
      </div>`,
          )
          .join("")}
    </div>`;
            }

            function selectAnswer(i) {
                evalAnswers[currentQ] = i;
                renderQuestion();
            }

            function nextQuestion() {
                if (evalAnswers[currentQ] === undefined) {
                    showNotif(
                        "⚠️",
                        "Respuesta requerida",
                        "Selecciona una opción antes de continuar.",
                    );
                    return;
                }
                if (currentQ < EVAL_QUESTIONS.length - 1) {
                    currentQ++;
                    renderQuestion();
                } else showEvalResult();
            }

            function showEvalResult() {
                let correct = 0;
                EVAL_QUESTIONS.forEach((q, i) => {
                    if (evalAnswers[i] === q.answer) correct++;
                });
                const pct = Math.round((correct / EVAL_QUESTIONS.length) * 100);
                const pass = pct >= 75;

                document.getElementById("eval-view").style.display = "none";
                document.getElementById("eval-result-view").style.display =
                    "block";

                const banner = document.getElementById("result-banner");
                banner.className = `result-banner ${pass ? "result-pass" : "result-fail"}`;
                document.getElementById("result-icon").textContent = pass
                    ? "🎉"
                    : "😔";
                document.getElementById("result-score").innerHTML =
                    `<span class="${pass ? "pass" : "fail"}">${pct}%</span>`;
                document.getElementById("result-score").className =
                    "result-score";
                document.getElementById("result-msg").textContent = pass
                    ? `¡Excelente! Aprobaste con ${correct} de ${EVAL_QUESTIONS.length} respuestas correctas.`
                    : `Obtuviste ${correct} de ${EVAL_QUESTIONS.length} correctas. El mínimo es 75%. ¡Intenta de nuevo!`;

                document.getElementById("result-answers").innerHTML =
                    EVAL_QUESTIONS.map((q, i) => {
                        const sel = evalAnswers[i];
                        const isCorrect = sel === q.answer;
                        return `<div style="margin-bottom:14px;">
      <p style="font-size:13px;font-weight:500;margin-bottom:6px;">${i + 1}. ${q.q}</p>
      ${q.options
          .map(
              (o, oi) => `
      <div class="option-item ${oi === sel ? (isCorrect ? "correct" : "incorrect") : oi === q.answer ? "correct" : ""}" style="pointer-events:none;margin-bottom:4px;">
        <div class="option-radio"></div> ${o}
        ${oi === q.answer ? '<span style="margin-left:auto;font-size:11px;color:var(--forest-mid);">✓ Correcta</span>' : ""}
        ${oi === sel && !isCorrect ? '<span style="margin-left:auto;font-size:11px;color:var(--red);">✗ Tu respuesta</span>' : ""}
      </div>`,
          )
          .join("")}
    </div>`;
                    }).join("");
            }

            function endEval() {
                document.getElementById("eval-list-view").style.display =
                    "block";
                document.getElementById("eval-view").style.display = "none";
                document.getElementById("eval-result-view").style.display =
                    "none";
            }

            // ─── MODAL ──────────────────────────────────────
            function openModal() {
                document.getElementById("modal").classList.add("open");
            }
            function closeModal() {
                document.getElementById("modal").classList.remove("open");
            }
            document
                .getElementById("modal")
                .addEventListener("click", function (e) {
                    if (e.target === this) closeModal();
                });

            // ─── NOTIFICATION ───────────────────────────────
            let notifTimeout;
            function showNotif(icon, title, msg) {
                document.getElementById("notif-icon").textContent = icon;
                document.getElementById("notif-title").textContent = title;
                document.getElementById("notif-msg").textContent = msg;
                const n = document.getElementById("notif");
                n.classList.add("show");
                clearTimeout(notifTimeout);
                notifTimeout = setTimeout(
                    () => n.classList.remove("show"),
                    3200,
                );
            }

            // TABS (generic)
            document.addEventListener("click", function (e) {
                if (e.target.classList.contains("tab")) {
                    const tabs = e.target.closest(".tabs");
                    if (tabs) {
                        tabs.querySelectorAll(".tab").forEach((t) =>
                            t.classList.remove("active"),
                        );
                        e.target.classList.add("active");
                    }
                }
            });
        </script>
    </body>
</html>
